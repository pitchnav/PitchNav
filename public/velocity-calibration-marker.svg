<text x="425" y="875" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#061126">PITCH NAV AUTOMATIC CALIBRATION</text>
<text x="425" y="920" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#1f2937">Print at Actual Size / 100%. Do not Fit to Page.</text>
<text x="425" y="955" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">The black square must measure exactly 8 × 8 inches.</text>
<text x="425" y="995" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#1f2937">Mount flat and vertical, beside the pitcher, in the throwing plane.</text>
<text x="425" y="1030" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Keep the full marker visible through ball release.</text>
